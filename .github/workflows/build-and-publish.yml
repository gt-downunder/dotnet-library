name: Build Project and Publish NuGet Package

on:
    workflow_dispatch:
    push:
        branches:
            - main
        tags:
            - 'v*.*.*'  # Trigger on version tags (e.g., v1.1.0, v2.0.0)

permissions:
  contents: read

env:
  DOTNET_SDK_VERSION: 10.0.x
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Required for MinVer to read Git history

    - name: Get version from MinVer
      id: set_version
      run: |
          # MinVer will calculate version from Git tags
          # No need to set VERSION manually - MinVer handles it
          echo "MinVer will calculate version from Git tags"

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Grondo.sln

    - name: Build
      run: dotnet build Grondo.sln --no-restore -c Release

    - name: Display calculated version
      run: |
        echo "### 📦 Package Version" >> $GITHUB_STEP_SUMMARY
        dotnet build src/Grondo.csproj --no-restore -c Release 2>&1 | grep "MinVer:" >> $GITHUB_STEP_SUMMARY || echo "MinVer output not found" >> $GITHUB_STEP_SUMMARY

    - name: Run tests with coverage
      run: >-
        dotnet test tests/Grondo.Tests.csproj --no-restore -c Release
        --collect:"XPlat Code Coverage"
        --results-directory ./coverage

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: >-
        reportgenerator
        -reports:./coverage/**/coverage.cobertura.xml
        -targetdir:./coverage/report
        -reporttypes:MarkdownSummaryGithub

    - name: Write coverage to job summary
      run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Pack
      run: dotnet pack src/Grondo.csproj --no-build -c Release -o ./nupkgs/
      # MinVer automatically sets the package version from Git tags

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v6
      with:
        name: nupkgs
        path: ./nupkgs/

  publish:
    needs: build
    runs-on: ubuntu-24.04
    # Only publish on main branch or when a version tag is pushed
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      packages: write

    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v7
      with:
        name: nupkgs
        path: ./nupkgs/

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

    - name: Push to NuGet
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.nuget_api_key }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push to GitHub Packages
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/gt-downunder/index.json --skip-duplicate
